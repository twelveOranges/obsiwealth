name: Release

# Trigger: pushing a tag whose name matches the plugin version
# (Obsidian stores use tag == manifest.version, without a leading "v",
# e.g. "1.0.3" — but we accept "v1.0.3" too and strip the prefix below).
on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Derive version (strip optional leading "v")
        id: ver
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=$TAG"        >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify manifest.json version matches tag
        run: |
          MANIFEST_VERSION=$(node -p "require('./manifest.json').version")
          EXPECTED="${{ steps.ver.outputs.version }}"
          if [ "$MANIFEST_VERSION" != "$EXPECTED" ]; then
            echo "::error::manifest.json version ($MANIFEST_VERSION) != tag ($EXPECTED)"
            exit 1
          fi

      - name: Build & stage release artifacts
        run: npm run release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.version }}
          draft: false
          prerelease: false
          files: |
            release/main.js
            release/manifest.json
            release/styles.css
          fail_on_unmatched_files: false
